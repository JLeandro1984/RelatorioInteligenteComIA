<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background -->
  <rect width="256" height="256" fill="#4f8ef7" rx="32"/>
  
  <!-- Dashboard/Report Grid -->
  <g transform="translate(50, 55)">
    <!-- Top KPI Cards -->
    <rect x="0" y="0" width="32" height="28" fill="rgba(255,255,255,0.3)" rx="4"/>
    <rect x="42" y="0" width="32" height="28" fill="rgba(255,255,255,0.3)" rx="4"/>
    <rect x="84" y="0" width="32" height="28" fill="rgba(255,255,255,0.3)" rx="4"/>
    
    <!-- Chart Area -->
    <g transform="translate(0, 38)">
      <!-- Bar Chart (representing data) -->
      <rect x="0" y="25" width="8" height="35" fill="rgba(255,255,255,0.8)" rx="2"/>
      <rect x="12" y="15" width="8" height="45" fill="rgba(255,255,255,0.9)" rx="2"/>
      <rect x="24" y="18" width="8" height="42" fill="rgba(255,255,255,0.85)" rx="2"/>
      <rect x="36" y="8" width="8" height="52" fill="rgba(255,255,255,0.95)" rx="2"/>
      <rect x="48" y="20" width="8" height="40" fill="rgba(255,255,255,0.8)" rx="2"/>
      <rect x="60" y="12" width="8" height="48" fill="rgba(255,255,255,0.9)" rx="2"/>
      <rect x="72" y="22" width="8" height="38" fill="rgba(255,255,255,0.85)" rx="2"/>
      <rect x="84" y="10" width="8" height="50" fill="rgba(255,255,255,0.95)" rx="2"/>
      
      <!-- Baseline -->
      <line x1="-2" y1="60" x2="96" y2="60" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    </g>
    
    <!-- AI Brain Icon (top right corner) - representing intelligence -->
    <g transform="translate(98, 5)">
      <!-- Brain outline -->
      <circle cx="8" cy="6" r="3.5" fill="rgba(255,255,255,0.9)" opacity="0.8"/>
      <circle cx="2" cy="10" r="2.5" fill="rgba(255,255,255,0.85)" opacity="0.8"/>
      <circle cx="14" cy="10" r="2.5" fill="rgba(255,255,255,0.85)" opacity="0.8"/>
      <circle cx="8" cy="14" r="2" fill="rgba(255,255,255,0.8)" opacity="0.8"/>
      <!-- Connection lines -->
      <line x1="8" y1="9.5" x2="2" y2="12" stroke="rgba(255,255,255,0.6)" stroke-width="0.8" opacity="0.7"/>
      <line x1="8" y1="9.5" x2="14" y2="12" stroke="rgba(255,255,255,0.6)" stroke-width="0.8" opacity="0.7"/>
      <line x1="2" y1="12" x2="14" y2="12" stroke="rgba(255,255,255,0.5)" stroke-width="0.6" opacity="0.6"/>
    </g>
  </g>
  
  <!-- Sparkle effect (representing intelligence/insights) -->
  <g transform="translate(30, 35)">
    <circle cx="0" cy="0" r="2" fill="rgba(255,255,255,0.9)"/>
    <path d="M -0.5 -3 L 0.5 -3 L 0.5 -0.5 L 3 -0.5 L 3 0.5 L 0.5 0.5 L 0.5 3 L -0.5 3 L -0.5 0.5 L -3 0.5 L -3 -0.5 L -0.5 -0.5 Z" fill="rgba(255,255,255,0.7)"/>
  </g>
  
  <!-- Right sparkle -->
  <g transform="translate(220, 50)">
    <circle cx="0" cy="0" r="1.5" fill="rgba(255,255,255,0.8)"/>
    <path d="M -0.4 -2.2 L 0.4 -2.2 L 0.4 -0.4 L 2.2 -0.4 L 2.2 0.4 L 0.4 0.4 L 0.4 2.2 L -0.4 2.2 L -0.4 0.4 L -2.2 0.4 L -2.2 -0.4 L -0.4 -0.4 Z" fill="rgba(255,255,255,0.6)"/>
  </g>
</svg>
